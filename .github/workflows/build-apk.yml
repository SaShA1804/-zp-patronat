name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:   # дозволяє запуск вручну з вкладки Actions

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            git zip unzip openjdk-17-jdk \
            autoconf automake libtool libtool-bin pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 \
            cmake libffi-dev libssl-dev build-essential ccache \
            libltdl-dev gettext

      - name: Install Buildozer & Cython
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install buildozer==1.5.0 cython==0.29.36

      - name: Cache Buildozer global directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-global-${{ hashFiles('mobile/buildozer.spec') }}

      - name: Build APK (debug)
        working-directory: mobile
        run: |
          export BUILDOZER_WARN_ON_ROOT=0
          set -o pipefail
          yes | buildozer -v android debug 2>&1 | tee build.log

      - name: Show error tail (on failure)
        if: failure()
        working-directory: mobile
        run: |
          echo "==================== ОСТАННІ 120 РЯДКІВ ЛОГУ ===================="
          tail -n 120 build.log || true

      - name: Publish error tail to ci-logs branch (on failure)
        if: failure()
        run: |
          tail -n 400 mobile/build.log > /tmp/error-tail.txt 2>/dev/null || echo "no build.log found" > /tmp/error-tail.txt
          cd "$RUNNER_TEMP"
          rm -rf logpush && mkdir logpush && cd logpush
          git init -q
          cp /tmp/error-tail.txt error-tail.txt
          git add error-tail.txt
          git -c user.name=ci -c user.email=ci@ci commit -q -m "error tail [skip ci]"
          git branch -M ci-logs
          git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git push -f origin ci-logs

      - name: Upload full build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: mobile/build.log
          if-no-files-found: ignore

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: zp-patronat-apk
          path: mobile/bin/*.apk
          if-no-files-found: error
